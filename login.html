<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Benar</title>

    <link rel="stylesheet" href="style.css">

    <style>
        body{
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background:#f5f5f5;
            font-family:Arial,sans-serif;
        }

        .login-box{
            width:360px;
            background:#fff;
            padding:30px;
            border-radius:12px;
            box-shadow:0 10px 30px rgba(0,0,0,.1);
        }

        .login-box h2{
            text-align:center;
            margin-bottom:20px;
        }

        .login-box input{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:1px solid #ddd;
            border-radius:8px;
            font-size:16px;
        }

        .login-box button{
            width:100%;
            padding:12px;
            border:none;
            border-radius:8px;
            background:#000;
            color:#fff;
            cursor:pointer;
            font-size:16px;
        }

        .login-box button:hover{
            opacity:.9;
        }

        #loginError{
            color:red;
            margin-top:15px;
            text-align:center;
        }
    </style>

</head>

<body>

<div class="login-box">

    <h2>Admin Login</h2>

    <form id="loginForm">

        <input
            type="email"
            id="email"
            placeholder="Email"
            required>

        <input
            type="password"
            id="password"
            placeholder="Password"
            required>

        <button type="submit">
            Login
        </button>

    </form>

    <p id="loginError"></p>

</div>

<script type="module" src="login.js"></script>

</body>
</html>
