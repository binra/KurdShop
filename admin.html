<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - KurdShop</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <a href="index.html">
        <img src="images/logo.png" class="logo" alt="Logo">
    </a>

    <h1>Admin Panel</h1>
</header>

<main class="admin-page">

    <h2>Add New Product</h2>

    <input type="hidden" id="productId">
    
    <form id="productForm">

        <input
            type="text"
            id="title"
            placeholder="Product Name"
            required
        >

        <input
            type="number"
            id="price"
            placeholder="Price"
            required
        >

        <input
            type="text"
            id="image"
            placeholder="Image Path"
            required
        >

        <input
            type="text"
            id="category"
            placeholder="Category"
            required
        >

        <input
            type="text"
            id="link"
            placeholder="Product Link"
        >

        <textarea
            id="description"
            placeholder="Description"
            rows="5"
        ></textarea>

        <button type="submit">
            Add Product
        </button>

    </form>

    <hr>

    <h2>Products</h2>

    <div id="adminProducts"></div>

    <hr>

    <h2>Orders</h2>

    <div id="dashboard">

    <div class="card">
        <h3>Total Products</h3>
        <h2 id="totalProducts">0</h2>
    </div>

    <div class="card">
        <h3>Total Orders</h3>
        <h2 id="totalOrders">0</h2>
    </div>

    <div class="card">
        <h3>Pending</h3>
        <h2 id="pendingOrders">0</h2>
    </div>

    <div class="card">
        <h3>Completed</h3>
        <h2 id="completedOrders">0</h2>
    </div>

    <div class="card">
        <h3>Cancelled</h3>
        <h2 id="cancelledOrders">0</h2>
    </div>

</div>

    <div id="ordersList"></div>

</main>

<script type="module" src="admin.js"></script>

</body>
</html>
